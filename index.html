<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="tarot-build" content="2026-01-31-01">
    <title>Mystic Tarot | 神秘塔罗</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --card-width: clamp(120px, 20vw, 200px);
            --card-height: calc(var(--card-width) * 1.75);
            --bg-dark: #050510;
            --accent-gold: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.6);
        }

        @media (max-width: 768px) and (orientation: portrait) {
            :root {
                --card-width: clamp(92px, 24vw, 150px);
            }
        }

        @media (max-width: 480px) and (orientation: portrait) {
            :root {
                --card-width: clamp(86px, 26vw, 140px);
            }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            :root {
                --card-width: clamp(96px, 26vh, 140px);
            }
        }

        /* Intro Animation Class - if needed, but we will use JS interpolation */

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Cinzel', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            user-select: none;
        }

        /* Background Effects */
        /* 隐藏原来的星空画布，如果你以后想换回来，可以删掉这行 */
        #stars-canvas {
            display: none;
        }

        /* 新增：视频背景容器样式 */
        #video-bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            /* 保证在最底层 */
            overflow: hidden;
        }

        #video-background {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 关键属性：让视频像背景图片一样剪裁铺满，不会拉伸变形 */
        }

        #fog-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(10, 10, 30, 0.9), transparent);
            z-index: 1;
            pointer-events: none;
        }

        #asset-loader {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(5, 5, 16, 0.92);
            backdrop-filter: blur(6px);
            pointer-events: auto;
        }

        #asset-progress-container {
            width: min(320px, 80vw);
            height: 8px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
        }

        #asset-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.7), rgba(240, 230, 140, 0.9));
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.35);
            transition: width 0.15s linear;
        }

        /* Main Game Container */
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            perspective: 1200px;
            /* Increased perspective for deeper look */
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 3D Scene for Cards */
        #scene {
            width: 100%;
            height: 60vh;
            position: relative;
            transform-style: preserve-3d;
            /* removed transition, we handle it in JS loop */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card Styles */
        .card-wrapper {
            position: absolute;
            width: var(--card-width);
            height: var(--card-height);
            transform-style: preserve-3d;
            /* 1. 改用更灵敏、具有缓动弹性的 cubic-bezier 贝塞尔曲线 */
            transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, filter 0.3s;
            cursor: pointer;
            border-radius: 15px;
            /* 2. 初始给一点点微弱的阴影，让它立体 */
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.6));
        }

        /* 3. 新增：当手势或键盘快速滑动时，通过 JS 动态给牌加上这个类，实现“电影级”运动模糊 */
        .card-wrapper.moving-blur {
            filter: blur(1.5px) brightness(0.9);
            transition: transform 0.1s linear, filter 0.2s;
            /* 滑动时响应要极快 */
        }

        /* 4. 让当前被选中的中心牌有更璀璨的神圣光芒 */
        .card-wrapper.selected {
            box-shadow: 0 0 35px var(--accent-glow), 0 0 15px #fff;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.8)) brightness(1.1);
            z-index: 1000 !important;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            border-radius: 15px;
        }

        .card-wrapper.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 2px solid #333;
        }

        .card-back {
            background: repeating-linear-gradient(45deg,
                    #1a1a2e,
                    #1a1a2e 10px,
                    #16213e 10px,
                    #16213e 20px);
            background-image: url('https://www.transparenttextures.com/patterns/black-thread.png');
            /* Fallback or simple pattern */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Elaborate back design using CSS pseudo-elements */
        .card-back::after {
            content: '✦';
            font-size: 3rem;
            color: rgba(212, 175, 55, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
            background-size: cover;
            background-position: center;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        #header {
            text-align: center;
            text-shadow: 0 0 10px var(--accent-gold);
            margin-top: 20px;
        }

        h1 {
            margin: 0;
            font-weight: 300;
            letter-spacing: 5px;
            color: var(--accent-gold);
        }

        #status-text {
            text-align: center;
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 10px;
            text-shadow: 0 0 5px black;
        }

        #controls {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
        }

        .btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #webcam-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border: 1px solid var(--accent-gold);
            opacity: 0.5;
            border-radius: 10px;
            transform: scaleX(-1);
            /* Mirror */
            z-index: 100;
        }

        #interpretation-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            max-height: 80%;
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid var(--accent-gold);
            padding: 30px;
            border-radius: 20px;
            color: #eee;
            overflow-y: auto;
            display: none;
            /* Hidden by default */
            pointer-events: auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            z-index: 50;
        }

        #interpretation-content {
            line-height: 1.6;
            font-size: 1.1rem;
        }

        #interpretation-content h3 {
            color: var(--accent-gold);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        #token-input-container {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
            z-index: 100;
        }

        #api-token {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #555;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            width: 150px;
            transition: width 0.3s;
        }

        #api-token:focus {
            width: 300px;
            border-color: var(--accent-gold);
            outline: none;
        }

        /* Hand Gesture Guide */
        #gesture-guide {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            /* Removed based on user request */
            gap: 20px;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            width: 100%;
            justify-content: center;
        }

        .guide-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: rgba(212, 175, 55, 0.5);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            /* Ensure no blocking */
        }

        #zone-left {
            left: 0;
            justify-content: flex-start;
            padding-left: 50px;
        }

        #zone-right {
            right: 0;
            justify-content: flex-end;
            padding-right: 50px;
        }

        #zone-center {
            left: 30%;
            width: 40%;
            align-items: flex-end;
            padding-bottom: 180px;
        }

        .guide-zone.active {
            opacity: 1;
            text-shadow: 0 0 20px var(--accent-gold);
        }

        /* New Pulse Animation */
        @keyframes pulseRing {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
                border-width: 5px;
            }

            100% {
                transform: translate(-50%, -50%) scale(2.0);
                opacity: 0;
                border-width: 0px;
            }
        }

        .guide-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid transparent;
        }

        .guide-icon.active {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(1.2);
        }

        /* Cursor & Particles */
        #hand-cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent-glow);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
            display: none;
            /* Hidden until hand detected */
        }

        /* Removed grabbing state as requested */
        /* #hand-cursor.grabbing { ... } */

        .cursor-trail {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent-glow);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.8;
            animation: fadeTrail 0.5s forwards;
        }

        @keyframes fadeTrail {
            to {
                opacity: 0;
                transform: scale(0.2);
            }
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2001;
            animation: riseAndFade 0.8s ease-out forwards;
            box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
        }

        @keyframes riseAndFade {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -150px) scale(0.2);
                opacity: 0;
            }
        }

        /* Charge Progress Bar */
        #charge-progress-container {
            width: 200px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin: 10px auto;
            overflow: hidden;
            display: none;
            /* Hidden by default */
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        #charge-progress-bar {
            width: 0%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            transition: width 0.1s linear;
        }

        /* Charge Ring */
        #charge-ring {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 4px solid var(--accent-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.1s linear;
        }

        /* Picked Card Zone */
        #picked-zone {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            /* Hidden initially */
            gap: 20px;
            z-index: 50;
            pointer-events: none;
        }

        .picked-slot {
            width: calc(var(--card-width) * 0.5);
            height: calc(var(--card-height) * 0.5);
            border: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.5s;
        }

        @media (max-width: 480px) {
            #picked-zone {
                bottom: 20px;
                gap: 12px;
            }
        }

        .picked-slot.filled {
            border-style: solid;
            border-color: var(--accent-gold);
            background: rgba(0, 0, 0, 0.6);
        }

        .mini-card {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            animation: flyIn 0.5s ease-out;
        }

        @keyframes flyIn {
            from {
                transform: translateY(-300px) scale(1.5);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--accent-gold);
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Settings Icon */
        #settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            color: var(--accent-gold);
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.5s;
            pointer-events: auto;
            /* Enable clicks */
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border: 1px solid transparent;
        }

        #settings-btn:hover {
            transform: rotate(90deg);
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* Settings Modal */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 3000;
            backdrop-filter: blur(5px);
        }

        .settings-content {
            background: #111;
            border: 2px solid var(--accent-gold);
            width: 90%;
            max-width: 400px;
            margin: 15vh auto;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            color: #eee;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .settings-content input {
            width: 80%;
            padding: 10px;
            margin: 20px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            font-size: 1rem;
        }

        .settings-content a {
            color: var(--accent-gold);
            text-decoration: underline;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>

<body>

    <!-- Background Canvas -->
    <div id="video-bg-container">
        <!-- 你可以在 src="" 里面填写你的视频相对路径（如 assets/bg.mp4）或网络视频链接 -->
        <video id="video-background" autoplay loop muted playsinline src="背景.mp4"></video>
    </div>
    <div id="fog-layer"></div>

    <div id="asset-loader">
        <div style="font-size: 1.25rem; color: var(--accent-gold); letter-spacing: 2px;">资源加载中 · v2026-01-31-01</div>
        <div id="asset-progress-text" style="color: #ddd; font-size: 0.95rem;">0%</div>
        <div id="asset-progress-container">
            <div id="asset-progress-bar"></div>
        </div>
        <button id="asset-retry-btn" class="btn" style="display:none">重试加载</button>
    </div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div id="settings-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path
                    d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
            </svg>
        </div>
        <div id="hand-cursor"></div>
        <div id="charge-ring"></div>
        <div id="header">
            <h1>神秘塔罗</h1>
            <div id="status-text">正在启动...</div>
            <div id="charge-progress-container">
                <div id="charge-progress-bar"></div>
            </div>
        </div>

        <div id="picked-zone">
            <div class="picked-slot" id="slot-0"></div>
            <div class="picked-slot" id="slot-1"></div>
            <div class="picked-slot" id="slot-2"></div>
        </div>

        <!-- Token Input Removed -->

        <div id="gesture-guide">
            <div id="zone-left" class="guide-zone">向右挥动 ➡</div>
            <div id="zone-right" class="guide-zone">⬅ 向左挥动</div>
            <div id="zone-center" class="guide-zone">
                <div class="guide-icon" id="icon-select">✊</div>
                <div style="font-size: 1rem; margin-top: 10px; text-shadow: 0 0 5px black;">握拳选牌</div>
            </div>
        </div>

        <div id="controls">
            <button id="start-btn" class="btn" style="display:none">开始体验</button>
            <button id="interpret-btn" class="btn"
                style="display:none; background: linear-gradient(45deg, #d4af37, #f0e68c); color: #000; font-weight: bold; box-shadow: 0 0 20px rgba(212,175,55,0.6);">🔮
                解读命运</button>
            <div class="spinner" id="loading-spinner"></div>
        </div>
    </div>

    <video id="webcam-preview" playsinline></video>

    <!-- 3D Scene -->
    <div id="game-container">
        <div id="scene">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <!-- Interpretation Modal -->
    <div id="interpretation-modal">
        <h2 style="color: var(--accent-gold); text-align: center; margin-top: 0;">命运启示</h2>
        <div id="interpretation-content"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn"
                onclick="document.getElementById('interpretation-modal').style.display='none'">关闭</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal">
        <div class="settings-content">
            <h2 style="color: var(--accent-gold);">API Key 配置 （本地存储）</h2>
            <p>请输入您的 DeepSeek API Key 以开启 AI 解读功能。</p>
            <p style="font-size: 0.9rem; color: #aaa;">
                还没有 Key？前往 <a href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek Platform</a> 获取。
            </p>
            <input type="password" id="api-token-input" placeholder="sk-...">
            <div id="token-status" style="font-size: 0.8rem; margin: 10px 0; min-height: 1.2em;"></div>
            <button id="save-settings-btn" class="btn">保存配置</button>
            <button id="close-settings-btn" class="btn"
                style="background: transparent; border: 1px solid #444; margin-top: 10px;">关闭</button>
        </div>
    </div>

    <script>
       // --- 1. Card Data & Configuration ---
        const ASSETS_PATH = 'assets/tarot/pkt/';

        const generateCards = () => {
            const cards = [];
            const majorNames = [
                "The Fool", "The Magician", "The High Priestess", "The Empress", "The Emperor",
                "The Hierophant", "The Lovers", "The Chariot", "Strength", "The Hermit",
                "Wheel of Fortune", "Justice", "The Hanged Man", "Death", "Temperance",
                "The Devil", "The Tower", "The Star", "The Moon", "The Sun",
                "Judgement", "The World"
            ];

            majorNames.forEach((name, i) => {
                const id = `ar${String(i).padStart(2, '0')}`;
                cards.push({ id, name, type: 'major', img: `${ASSETS_PATH}${id}.jpg` });
            });

            const suits = [
                { code: 'wa', name: 'Wands' }, { code: 'cu', name: 'Cups' },
                { code: 'sw', name: 'Swords' }, { code: 'pe', name: 'Pentacles' }
            ];

            const ranks = [
                { code: 'ac', name: 'Ace' }, { code: '02', name: 'Two' }, { code: '03', name: 'Three' }, 
                { code: '04', name: 'Four' }, { code: '05', name: 'Five' }, { code: '06', name: 'Six' }, 
                { code: '07', name: 'Seven' }, { code: '08', name: 'Eight' }, { code: '09', name: 'Nine' }, 
                { code: '10', name: 'Ten' }, { code: 'pa', name: 'Page' }, { code: 'kn', name: 'Knight' }, 
                { code: 'qu', name: 'Queen' }, { code: 'ki', name: 'King' }
            ];

            suits.forEach(suit => {
                ranks.forEach(rank => {
                    const id = `${suit.code}${rank.code}`;
                    cards.push({ id, name: `${rank.name} of ${suit.name}`, type: 'minor', img: `${ASSETS_PATH}${id}.jpg` });
                });
            });
            return cards;
        };

        const FULL_DECK = generateCards();
        let currentDeck = [];
        let pickedCards = []; 
        let assetsReady = false;
        let assetsFailed = false;
        let cameraReady = false;
        let cameraError = false;

        function setAssetProgress(progress, label) {
            const pct = Math.max(0, Math.min(100, Math.round(progress)));
            const text = document.getElementById('asset-progress-text');
            const bar = document.getElementById('asset-progress-bar');
            if (text) text.innerText = label ? `${label} ${pct}%` : `${pct}%`;
            if (bar) bar.style.width = `${pct}%`;
        }

        function updateIdleStatus() {
            if (currentState !== STATE.IDLE) return;
            if (cameraError) return;
            const status = document.getElementById('status-text');
            if (!status) return;
            if (assetsFailed) {
                status.innerText = "资源加载失败，点击重试";
                return;
            }
            if (!assetsReady) {
                status.innerText = "资源加载中...";
                return;
            }
            if (cameraReady) {
                status.innerText = "张开你的五指开始";
            }
        }

        function preloadDeckAssets() {
            const loader = document.getElementById('asset-loader');
            const retryBtn = document.getElementById('asset-retry-btn');
            if (retryBtn) retryBtn.style.display = 'none';
            if (loader) loader.style.display = 'flex';

            assetsReady = false;
            assetsFailed = false;
            setAssetProgress(0);
            updateIdleStatus();

            const images = FULL_DECK.map(c => c.img).filter(Boolean);
            const uniqueImages = Array.from(new Set(images));
            const total = uniqueImages.length;
            let doneCount = 0;
            let failCount = 0;

            if (total === 0) {
                assetsReady = true;
                if (loader) loader.style.display = 'none';
                updateIdleStatus();
                return;
            }

            uniqueImages.forEach((src) => {
                const img = new Image();
                img.decoding = 'async';
                img.onload = () => {
                    doneCount += 1;
                    const progress = ((doneCount + failCount) / total) * 100;
                    setAssetProgress(progress);
                    if (doneCount + failCount === total) finish();
                };
                img.onerror = () => {
                    failCount += 1;
                    const progress = ((doneCount + failCount) / total) * 100;
                    setAssetProgress(progress);
                    if (doneCount + failCount === total) finish();
                };
                img.src = src;
            });

            function finish() {
                if (failCount > 0) {
                    assetsFailed = true;
                    setAssetProgress(100, "加载失败");
                    if (retryBtn) retryBtn.style.display = 'inline-block';
                    if (retryBtn) retryBtn.onclick = () => preloadDeckAssets();
                    updateIdleStatus();
                    return;
                }
                assetsReady = true;
                setAssetProgress(100, "加载完成");
                if (loader) loader.style.display = 'none';
                updateIdleStatus();
            }
        }

        // --- 2. Game State & Logic ---
        const STATE = {
            IDLE: 'IDLE',
            INTRO: 'INTRO',
            PICKING: 'PICKING',
            REVEALING: 'REVEALING',
            INTERPRETING: 'INTERPRETING'
        };

        let currentState = STATE.IDLE;
        let currentIndex = 0;   
        let velocity = 0;       
        let isDragging = false; 

        // --- 3. 3D Scene & Rendering ---
        const sceneElement = document.getElementById('scene');

        function initStars() {
            // 保留空白函数以防调用报错，实际背景由视频接管
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createCardElement(card, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'card-wrapper';
            wrapper.dataset.index = index;

            const inner = document.createElement('div');
            inner.className = 'card-inner';

            const back = document.createElement('div');
            back.className = 'card-face card-back';

            const front = document.createElement('div');
            front.className = 'card-face card-front';
            front.style.backgroundImage = `url('${card.img}')`;

            inner.appendChild(back);
            inner.appendChild(front);
            wrapper.appendChild(inner);

            return wrapper;
        }

        function renderDeck() {
            sceneElement.innerHTML = '';
            if (currentState === STATE.PICKING || currentState === STATE.INTRO) {
                currentDeck.forEach((card, i) => {
                    const el = createCardElement(card, i);
                    sceneElement.appendChild(el);
                });
                updateCardPositions();
            } else if (currentState === STATE.REVEALING || currentState === STATE.INTERPRETING) {
                pickedCards.forEach((item, i) => {
                    const el = createCardElement(item.card, i);
                    el.classList.add('picked-card');
                    sceneElement.appendChild(el);
                });
                updatePickedPositions();
            }
        }

        function updateCardPositions() {
            if (currentState !== STATE.PICKING && currentState !== STATE.INTRO) return;

            const cards = document.querySelectorAll('.card-wrapper');
            const width = window.innerWidth;

            const cardWidthVar = getComputedStyle(document.documentElement).getPropertyValue('--card-width').trim();
            const cardWidthPx = parseFloat(cardWidthVar) || 200;
            const compactMedia = window.matchMedia && window.matchMedia('(orientation: landscape) and (max-height: 520px)').matches;
            const isMobile = width <= 480 || compactMedia;

            const gap = Math.min(
                Math.max(cardWidthPx * (isMobile ? 0.85 : 1.15), width * (isMobile ? 0.12 : 0.18)),
                cardWidthPx * (isMobile ? 1.25 : 2)
            );

            const visibleSideCount = Math.ceil((width / 2) / (gap * 0.5)) + 3;
            const isSpeeding = Math.abs(velocity) > 0.03;

            cards.forEach((card, i) => {
                if (card.classList.contains('picked')) {
                    card.style.display = 'none';
                    return;
                }

                const dist = i - currentIndex;
                const absDist = Math.abs(dist);

                if (absDist > visibleSideCount) {
                    card.style.display = 'none';
                    return;
                } else {
                    card.style.display = 'block';
                }

                const isSelected = Math.round(currentIndex) === i;

                // 【修复核心】：把 z 的计算移到 isSelected 变量定义之后，消除致命的 ReferenceError 报错
                const z = -Math.pow(absDist, 1.6) * 90 - (isSelected ? 0 : 50);
                const x = dist * gap * (1 + absDist * 0.05);
                const y = absDist * 12;

                let rotateY = dist * 14;
                if (rotateY > 65) rotateY = 65;
                if (rotateY < -65) rotateY = -65;
                const rotateZ = dist * -1.5;

                let scale = 1;

                if (isSpeeding && absDist < 4) {
                    card.classList.add('moving-blur');
                } else {
                    card.classList.remove('moving-blur');
                }

                if (absDist < 0.5) {
                    const selectedScaleBase = isMobile ? 1.15 : 1.35;
                    const selectedScaleFalloff = isMobile ? 0.3 : 0.6;
                    scale = selectedScaleBase - absDist * selectedScaleFalloff;
                    card.style.zIndex = 1000;
                } else {
                    scale = 1 - Math.min(absDist * 0.12, 0.5);
                    card.style.zIndex = 1000 - Math.floor(absDist * 50);
                }

                if (isSelected) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }

                if (isFistHeld && chargeTargetIndex !== null && i === chargeTargetIndex) {
                    scale *= chargeExtraScale;
                    card.style.zIndex = 2000;
                }

                card.style.transform = `
                    translateX(${x}px) 
                    translateY(${y}px)
                    translateZ(${z}px) 
                    rotateY(${rotateY}deg) 
                    rotateZ(${rotateZ}deg) 
                    scale(${scale})
                `;
            });
        }

        function updatePickedPositions() {
            const cards = document.querySelectorAll('.card-wrapper');
            const width = window.innerWidth;
            const compactMedia = window.matchMedia && window.matchMedia('(orientation: landscape) and (max-height: 520px)').matches;
            const spread = (width <= 480 || compactMedia) ? Math.min(width * 0.18, 180) : Math.min(width * 0.3, 400);

            const positions = [-spread, 0, spread];
            const labels = ["过去", "现在", "未来"];

            cards.forEach((card, i) => {
                const x = positions[i];
                if (i < pickedCards.length) {
                    const picked = pickedCards[i];
                    setTimeout(() => {
                        card.classList.add('flipped');
                        if (picked.reversed) {
                            const front = card.querySelector('.card-front');
                            if (front) {
                                front.style.transform = 'rotateX(180deg)'; 
                            }
                        }
                    }, i * 500 + 500);
                }

                card.style.transform = `translateX(${x}px) scale(1.1)`;
                card.style.zIndex = 10;

                if (!card.querySelector('.label')) {
                    const label = document.createElement('div');
                    label.className = 'label';
                    label.innerText = labels[i];
                    label.style.position = 'absolute';
                    label.style.bottom = '-40px';
                    label.style.width = '100%';
                    label.style.textAlign = 'center';
                    label.style.color = '#d4af37';
                    label.style.textShadow = '0 0 5px black';
                    label.style.fontSize = '1.2rem';
                    card.appendChild(label);
                }
            });
        }

        // --- 4. Controls & Hand Gestures ---
        let lastHandX = -1;
        let lastHandY = -1; 

        let fistHoldStart = 0;
        let isFistHeld = false;
        let lockedSelectIndex = null;
        let chargeTargetIndex = null;
        let chargeExtraScale = 1;
        const SELECTION_HOLD_TIME = 1000; 

        let isPalmHeld = false;
        let palmHoldStart = 0;
        const INTERPRET_HOLD_TIME = 1500;

        const FRICTION = 0.94; 
        const MAX_SCROLL_SPEED = 0.2; 

        function isFist(landmarks) {
            const wrist = landmarks[0];
            const tips = [8, 12, 16, 20];
            let avgDist = 0;
            tips.forEach(idx => {
                const tip = landmarks[idx];
                avgDist += Math.sqrt(Math.pow(tip.x - wrist.x, 2) + Math.pow(tip.y - wrist.y, 2));
            });
            return (avgDist / tips.length) < 0.23;
        }

        function isOpenPalm(landmarks) {
            const wrist = landmarks[0];
            const tips = [8, 12, 16, 20];
            let avgDist = 0;
            tips.forEach(idx => {
                const tip = landmarks[idx];
                avgDist += Math.sqrt(Math.pow(tip.x - wrist.x, 2) + Math.pow(tip.y - wrist.y, 2));
            });
            return (avgDist / tips.length) > 0.4;
        }

        function spawnChargeParticles(rect) {
            if (!rect) return;
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            for (let i = 0; i < 2; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const ox = (Math.random() - 0.5) * rect.width * 0.9;
                const oy = (Math.random() - 0.5) * rect.height * 0.9;
                p.style.left = (x + ox) + 'px';
                p.style.top = (y + oy) + 'px';
                const size = 2 + Math.random() * 6;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                if (Math.random() > 0.6) {
                    p.style.background = 'var(--accent-gold)';
                    p.style.boxShadow = '0 0 8px var(--accent-gold)';
                }
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function spawnInterpretationParticles() {
            for (let i = 0; i < 5; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (Math.random() * window.innerWidth) + 'px';
                p.style.top = (Math.random() * window.innerHeight) + 'px';
                const size = 3 + Math.random() * 8;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = 'var(--accent-gold)';
                p.style.boxShadow = '0 0 10px var(--accent-gold)';
                p.style.opacity = '0.8';
                p.style.zIndex = '9999';
                p.animate([
                    { transform: 'translateY(0) scale(1)', opacity: 0.8 },
                    { transform: `translateY(-100px) scale(0)`, opacity: 0 }
                ], { duration: 1000 + Math.random() * 1000, easing: 'ease-out' });
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        function spawnTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            const hue = (Date.now() / 10) % 360;
            trail.style.background = `hsla(${hue}, 80%, 60%, 0.8)`;
            trail.style.boxShadow = `0 0 10px hsla(${hue}, 80%, 60%, 0.8)`;
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 500);
        }

        function handleGesture(handLandmarks) {
            if (currentState !== STATE.PICKING && currentState !== STATE.INTERPRETING && currentState !== STATE.IDLE) return;

            const palm = handLandmarks[9];
            const x = palm.x;
            const y = palm.y;

            if (lastHandX === -1) {
                lastHandX = x; lastHandY = y;
                return;
            }

            const cursor = document.getElementById('hand-cursor');
            const screenX = (1 - x) * window.innerWidth; 
            const screenY = y * window.innerHeight;

            cursor.style.display = 'block';
            cursor.style.left = screenX + 'px';
            cursor.style.top = screenY + 'px';

            if (Math.sqrt(Math.pow(x - lastHandX, 2) + Math.pow(y - lastHandY, 2)) > 0.005) {
                spawnTrail(screenX, screenY);
            }

            // --- IDLE & INTERPRETING STATE ---
            if (currentState === STATE.IDLE || currentState === STATE.INTERPRETING) {
                const progressContainer = document.getElementById('charge-progress-container');
                const progressBar = document.getElementById('charge-progress-bar');

                if (isOpenPalm(handLandmarks)) {
                    if (!isPalmHeld) {
                        isPalmHeld = true;
                        palmHoldStart = Date.now();
                        if(progressContainer) {
                            progressContainer.style.display = 'block';
                            progressBar.style.width = '0%';
                        }
                    }
                    const elapsed = Date.now() - palmHoldStart;
                    const progress = Math.min(elapsed / INTERPRET_HOLD_TIME, 1.0);
                    if (Math.random() < 0.5) spawnInterpretationParticles();
                    if(progressBar) progressBar.style.width = (progress * 100) + '%';

                    if (elapsed > INTERPRET_HOLD_TIME) {
                        if (currentState === STATE.IDLE) {
                            startGame();
                        } else {
                            const token = localStorage.getItem('deepseek_token');
                            if (token) getAIInterpretation(token);
                        }
                        isPalmHeld = false;
                        if(progressContainer) progressContainer.style.display = 'none';
                    }
                } else {
                    if (isPalmHeld) {
                        isPalmHeld = false;
                        if(progressContainer) progressContainer.style.display = 'none';
                        if (currentState === STATE.IDLE) {
                            updateIdleStatus();
                        } else {
                            document.getElementById('status-text').innerText = "张开五指，开启命运解读";
                        }
                    }
                }
                lastHandX = x; lastHandY = y;
                return;
            }

            // --- PICKING STATE ZONE SCROLL ---
            const width = window.innerWidth;
            let targetV = 0;

            if (screenX < width * 0.33) {
                const intensity = Math.min(((width * 0.33) - screenX) / (width * 0.33), 1.0);
                targetV = -intensity * MAX_SCROLL_SPEED;
                highlightDirection('left');
            } else if (screenX > width * 0.66) {
                const intensity = Math.min((screenX - (width * 0.66)) / (width * 0.34), 1.0);
                targetV = intensity * MAX_SCROLL_SPEED;
                highlightDirection('right');
            } else {
                targetV = 0;
                if (!isFistHeld) resetHighlights();
            }

            velocity = velocity * 0.8 + targetV * 0.2;

            // --- SELECTION LOGIC ---
            const inCenterZone = screenX > width * 0.33 && screenX < width * 0.66;
            const fistDetected = isFist(handLandmarks);

            if (fistDetected && inCenterZone) {
                if (!isFistHeld) {
                    isFistHeld = true;
                    fistHoldStart = Date.now();
                    lockedSelectIndex = Math.round(currentIndex);
                    chargeTargetIndex = lockedSelectIndex;
                    highlightDirection('select');
                }

                const elapsed = Date.now() - fistHoldStart;
                const progress = Math.min(elapsed / SELECTION_HOLD_TIME, 1.0);
                chargeExtraScale = 1 + progress * 0.15;

                const targetIdx = lockedSelectIndex ?? Math.round(currentIndex);
                const cards = document.querySelectorAll('.card-wrapper');
                
                cards.forEach(card => {
                    if (parseInt(card.dataset.index) === targetIdx) {
                        const glowSize = 30 + (progress * 100);
                        const glowAlpha = 0.8 + (progress * 0.2);
                        card.style.boxShadow = `0 0 ${glowSize}px rgba(255, 255, 255, ${glowAlpha}), 0 0 ${glowSize * 0.5}px rgba(255, 255, 255, 1)`;
                        card.style.filter = `brightness(${1 + progress * 1.5})`;
                        card.style.zIndex = 2000;
                        spawnChargeParticles(card.getBoundingClientRect());
                    }
                });

                if (elapsed > SELECTION_HOLD_TIME) {
                    selectCard();
                    isFistHeld = false;
                    chargeTargetIndex = null;
                    const ring = document.createElement('div');
                    ring.style.position = 'absolute';
                    ring.style.left = screenX + 'px'; ring.style.top = screenY + 'px';
                    ring.style.width = '100px'; ring.style.height = '100px';
                    ring.style.border = '4px solid white'; ring.style.borderRadius = '50%';
                    ring.style.transform = 'translate(-50%, -50%)';
                    ring.style.animation = 'pulseRing 0.5s ease-out';
                    document.body.appendChild(ring);
                    setTimeout(() => ring.remove(), 500);
                }
            } else {
                if (isFistHeld) {
                    isFistHeld = false;
                    chargeTargetIndex = null;
                    resetHighlights();
                    document.querySelectorAll('.card-wrapper').forEach(card => {
                        card.style.filter = ''; card.style.boxShadow = '';
                    });
                }
            }

            lastHandX = x; lastHandY = y;
        }

        let targetIndex = 0; 

        function gameLoop() {
            if (currentState === STATE.INTRO) {
                const dist = targetIndex - currentIndex;
                currentIndex += dist * 0.05;
                if (Math.abs(dist) < 0.1) {
                    currentIndex = targetIndex;
                    currentState = STATE.PICKING;
                    document.getElementById('status-text').innerText = "左右移动双手浏览，中区握拳选牌";
                    document.getElementById('picked-zone').style.display = 'flex';
                }
                updateCardPositions();
            }

            if (currentState === STATE.PICKING) {
                if (isFistHeld && lockedSelectIndex !== null) {
                    currentIndex = lockedSelectIndex;
                    velocity = 0;
                } else {
                    currentIndex += velocity;
                    velocity *= FRICTION;

                    if (Math.abs(velocity) < 0.015 && Math.abs(velocity) > 0) {
                        const nearestIndex = Math.round(currentIndex);
                        currentIndex += (nearestIndex - currentIndex) * 0.08;
                        if (Math.abs(nearestIndex - currentIndex) < 0.002) {
                            currentIndex = nearestIndex;
                            velocity = 0;
                        }
                    }

                    if (currentIndex < 0) {
                        currentIndex = 0; velocity = -velocity * 0.4;
                    }
                    if (currentIndex > currentDeck.length - 1) {
                        currentIndex = currentDeck.length - 1; velocity = -velocity * 0.4;
                    }
                }
                updateCardPositions();
            }
            requestAnimationFrame(gameLoop);
        }

        function highlightDirection(dir) {
            resetHighlights();
            if (dir === 'left') document.getElementById('zone-left').classList.add('active');
            if (dir === 'right') document.getElementById('zone-right').classList.add('active');
            if (dir === 'select') {
                document.getElementById('zone-center').classList.add('active');
                document.getElementById('icon-select').classList.add('active');
            }
        }

        function resetHighlights() {
            const zl = document.getElementById('zone-left');
            const zr = document.getElementById('zone-right');
            const zc = document.getElementById('zone-center');
            const ic = document.getElementById('icon-select');
            if(zl) zl.classList.remove('active');
            if(zr) zr.classList.remove('active');
            if(zc) zc.classList.remove('active');
            if(ic) ic.classList.remove('active');
        }

        requestAnimationFrame(gameLoop);

        function navigateDeck(dir) {
            velocity += dir * 0.15;
            if (dir < 0) highlightDirection('left');
            if (dir > 0) highlightDirection('right');
            setTimeout(resetHighlights, 200);
        }

        function selectCard() {
            if (currentState !== STATE.PICKING) return;

            const selectedIdxInt = Math.round(currentIndex);
            if (selectedIdxInt < 0 || selectedIdxInt >= currentDeck.length) return;

            const selectedCard = currentDeck[selectedIdxInt];
            if (pickedCards.some(p => p.card.id === selectedCard.id)) return;

            // 【优化】：利用真实卡牌数据状态隐藏，防止 DOM 结构匹配硬性错位
            const cardElements = document.querySelectorAll('.card-wrapper');
            cardElements.forEach(el => {
                if (parseInt(el.dataset.index) === selectedIdxInt) {
                    el.classList.add('picked');
                    el.style.opacity = '0'; 
                }
            });

            const isReversed = Math.random() < 0.3;
            pickedCards.push({
                card: selectedCard,
                reversed: isReversed,
                position: ['过去', '现在', '未来'][pickedCards.length]
            });

            document.getElementById('status-text').innerText = `已选卡牌 ${pickedCards.length}/3`;

            const slotIndex = pickedCards.length - 1;
            const slot = document.getElementById(`slot-${slotIndex}`);
            if (slot) {
                slot.classList.add('filled');
                const miniCard = document.createElement('div');
                miniCard.className = 'mini-card';
                miniCard.style.backgroundImage = `url('https://www.transparenttextures.com/patterns/black-scales.png')`; 
                miniCard.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:rgba(212,175,55,0.5);">✦</div>`;
                slot.appendChild(miniCard);
            }

            if (pickedCards.length === 3) {
                setTimeout(finishPicking, 1000);
            }
        }

        function finishPicking() {
            currentState = STATE.REVEALING;
            document.getElementById('status-text').innerText = "命运已揭示";
            const guide = document.getElementById('gesture-guide');
            const zone = document.getElementById('picked-zone');
            if (guide) guide.style.opacity = '0';
            if (zone) zone.style.opacity = '0';

            renderDeck(); 

            setTimeout(() => {
                currentState = STATE.INTERPRETING;
                const token = localStorage.getItem('deepseek_token');
                if (token) {
                    document.getElementById('status-text').innerText = "张开五指，开启命运解读";
                } else {
                    document.getElementById('status-text').innerText = "命运已定 (配置 Token 可获取 AI 解读)";
                }
            }, 2500);
        }

        async function setupCamera() {
            const videoElement = document.getElementById('webcam-preview');
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    handleGesture(results.multiHandLandmarks[0]);
                }
            });

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 320, height: 240
            });

            return camera;
        }

        async function getAIInterpretation(token) {
            const interpretBtn = document.getElementById('interpret-btn');
            if (interpretBtn) interpretBtn.style.display = 'none';
            document.getElementById('loading-spinner').style.display = 'block';

            const prompt = `你是一位精通神秘学、荣格心理学与象征符号的资深塔罗占卜师。我抽取了三张牌，分别代表“过去”、“现在”和“未来”（时间之流牌阵）。
            1. 过去: ${pickedCards[0].card.name} (${pickedCards[0].reversed ? '逆位' : '正位'})
            2. 现在: ${pickedCards[1].card.name} (${pickedCards[1].reversed ? '逆位' : '正位'})
            3. 未来: ${pickedCards[2].card.name} (${pickedCards[2].reversed ? '逆位' : '正位'})
            请用中文（简体）为我解读这组牌阵。输出包含：整体启示、牌面深度解析、命运指引。`;

            const modal = document.getElementById('interpretation-modal');
            const content = document.getElementById('interpretation-content');
            content.innerHTML = '';
            modal.style.display = 'block';

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { "role": "system", "content": "你是一位精通神秘学与心理学的资深塔罗占卜师。" },
                            { "role": "user", "content": prompt }
                        ],
                        stream: true
                    })
                });

                if (!response.ok) throw new Error("神谕连接失败");

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.slice(6);
                            if (jsonStr === '[DONE]') break;
                            try {
                                const json = JSON.parse(jsonStr);
                                if (json.choices && json.choices[0].delta.content) {
                                    fullText += json.choices[0].delta.content;
                                    if (window.marked && typeof window.marked.parse === 'function') {
                                        content.innerHTML = window.marked.parse(fullText);
                                    } else {
                                        content.textContent = fullText;
                                    }
                                }
                            } catch (e) {}
                        }
                    }
                }
                document.getElementById('status-text').innerText = "命运已揭晓";
            } catch (e) {
                content.innerHTML += `<p style="color:red">连接中断: ${e.message}</p>`;
            } finally {
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        // --- 7. Initialization ---
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const tokenInput = document.getElementById('api-token-input');

        function updateTokenStatus() {
            const token = localStorage.getItem('deepseek_token');
            if (token) tokenInput.value = token;
        }

        updateTokenStatus();

        if(settingsBtn) settingsBtn.addEventListener('click', () => { updateTokenStatus(); settingsModal.style.display = 'block'; });
        if(closeSettingsBtn) closeSettingsBtn.addEventListener('click', () => { settingsModal.style.display = 'none'; });

        if(saveSettingsBtn) saveSettingsBtn.addEventListener('click', () => {
            const apiToken = tokenInput.value.trim();
            if (!apiToken) { alert("请输入有效的 Token"); return; }
            localStorage.setItem('deepseek_token', apiToken);
            updateTokenStatus();
            settingsModal.style.display = 'none';
            alert("配置已保存到本地");
        });

        function startGame() {
            if (assetsFailed) { preloadDeckAssets(); return; }
            if (!assetsReady) { updateIdleStatus(); return; }
            
            const startBtn = document.getElementById('start-btn');
            if(startBtn) startBtn.style.display = 'none';
            document.getElementById('status-text').innerText = "命运之轮开始转动...";

            currentDeck = shuffle([...FULL_DECK]); 
            pickedCards = [];

            currentState = STATE.INTRO;
            targetIndex = Math.floor(currentDeck.length / 2);
            currentIndex = currentDeck.length + 5; 

            // 激活区域手势提示可见性
            const guide = document.getElementById('gesture-guide');
            if(guide) { guide.style.display = 'flex'; guide.style.opacity = '1'; }

            renderDeck(); 
        }

        async function initCameraFlow() {
            try {
                const camera = await setupCamera();
                await camera.start();
                cameraReady = true; cameraError = false;
                const startBtn = document.getElementById('start-btn');
                if(startBtn) startBtn.style.display = 'none';
                updateIdleStatus();
            } catch (e) {
                cameraReady = false; cameraError = true;
                document.getElementById('status-text').innerText = "需要摄像头权限以进行手势控制";
                const btn = document.getElementById('start-btn');
                if(btn) {
                    btn.style.display = 'block';
                    btn.innerText = "允许摄像头";
                    btn.onclick = () => initCameraFlow();
                }
            }
        }

        preloadDeckAssets();
        initCameraFlow();

        window.addEventListener('keydown', (e) => {
            if (currentState === STATE.IDLE) {
                if (e.key === 'Enter' || e.key === ' ') startGame();
                return;
            }
            if (currentState !== STATE.PICKING) return;
            
            if (e.key === 'ArrowLeft') { navigateDeck(-1); }
            if (e.key === 'ArrowRight') { navigateDeck(1); }
            if (e.key === 'ArrowUp' || e.key === ' ') { selectCard(); highlightDirection('select'); }
        });
    </script>
</body>

</html>
